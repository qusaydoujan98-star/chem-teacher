<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 بوصلة الكيمياء | دليل المعلم التوجيهي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --border: #30363d;
  --text: #e6edf3;
  --text2: #8b949e;
  --accent: #f0a500;
  --accent2: #e67e22;
  --green: #2ea043;
  --red: #f85149;
  --blue: #388bfd;
  --purple: #7c3aed;
  --teal: #0891b2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Cairo', 'Tajawal', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== HEADER ===== */
header {
  background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.logo { font-size: 1.2rem; font-weight: 900; color: var(--accent); }
.logo span { color: var(--text2); font-weight: 400; font-size: 0.85rem; margin-right: 8px; }

/* ===== TIMER ===== */
#timer-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 14px; cursor: pointer;
  transition: all 0.2s;
}
#timer-box:hover { border-color: var(--accent); }
#timer-display { font-size: 1.1rem; font-weight: 700; color: var(--accent); letter-spacing: 2px; min-width: 60px; text-align: center; }
.timer-btn { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 1rem; padding: 2px 6px; border-radius: 4px; }
.timer-btn:hover { background: var(--border); color: var(--text); }
#timer-box.running { border-color: var(--green); }
#timer-box.running #timer-display { color: var(--green); }
#timer-box.warning { border-color: var(--red); animation: pulse 1s infinite; }
#timer-box.warning #timer-display { color: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

/* ===== NAV TABS ===== */
.nav-tabs {
  display: flex; gap: 4px; padding: 12px 24px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.nav-tab {
  padding: 8px 16px; border-radius: 6px; cursor: pointer;
  font-size: 0.9rem; font-weight: 600; color: var(--text2);
  background: none; border: 1px solid transparent;
  white-space: nowrap; transition: all 0.2s;
}
.nav-tab:hover { background: var(--bg2); color: var(--text); }
.nav-tab.active { background: var(--bg3); color: var(--accent); border-color: var(--border); }

/* ===== MAIN LAYOUT ===== */
.page { display: none; padding: 24px; }
.page.active { display: block; }

/* ===== DASHBOARD ===== */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; text-align: center;
}
.stat-card .icon { font-size: 1.8rem; margin-bottom: 8px; }
.stat-card .num { font-size: 2rem; font-weight: 900; color: var(--accent); }
.stat-card .label { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }

/* ===== HEAT MAP ===== */
.heat-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 24px; }
.heat-section h3 { font-size: 1rem; color: var(--text2); margin-bottom: 16px; font-weight: 600; }
.heat-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.heat-bar-label { min-width: 200px; font-size: 0.85rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.heat-bar-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 22px; overflow: hidden; }
.heat-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-right: 8px; font-size: 0.75rem; font-weight: 700; color: #fff; transition: width 0.8s ease; }
.heat-bar-count { min-width: 40px; text-align: left; font-size: 0.8rem; color: var(--text2); font-weight: 700; }

/* ===== PREDICTIONS ===== */
.predictions-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; margin-bottom: 24px; }
.pred-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px;
  border-right: 4px solid var(--accent);
}
.pred-card .confidence { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; }
.conf-high { background: rgba(46,160,67,0.2); color: var(--green); }
.conf-very-high { background: rgba(240,165,0,0.2); color: var(--accent); }
.conf-medium { background: rgba(56,139,253,0.2); color: var(--blue); }
.pred-card h4 { font-size: 0.95rem; color: var(--text); margin-bottom: 6px; }
.pred-card p { font-size: 0.8rem; color: var(--text2); }

/* ===== LESSONS PAGE ===== */
.unit-section { margin-bottom: 28px; }
.unit-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: 8px; margin-bottom: 12px;
  background: var(--bg2); border: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.unit-header h2 { font-size: 1rem; font-weight: 700; flex: 1; }
.unit-badge { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; font-weight: 700; }
.unit-toggle { color: var(--text2); transition: transform 0.2s; }
.unit-section.collapsed .unit-toggle { transform: rotate(-90deg); }
.unit-section.collapsed .lessons-grid { display: none; }

.lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.lesson-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.lesson-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
.lesson-card::before { content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 4px; }
.heat-5::before { background: #ef4444; }
.heat-4::before { background: #f97316; }
.heat-3::before { background: #eab308; }
.heat-2::before { background: #22c55e; }
.heat-1::before { background: #3b82f6; }

.lesson-card h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
.lesson-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.meta-tag { font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: var(--bg3); color: var(--text2); }
.meta-tag.freq { background: rgba(240,165,0,0.15); color: var(--accent); font-weight: 700; }
.lesson-types { display: flex; gap: 6px; }
.type-chip { font-size: 0.72rem; padding: 2px 8px; border-radius: 4px; }
.type-mcq { background: rgba(56,139,253,0.15); color: var(--blue); }
.type-essay { background: rgba(124,58,237,0.15); color: #a78bfa; }
.type-calc { background: rgba(16,185,129,0.15); color: #34d399; }

/* ===== LESSON DETAIL MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.8); z-index: 200;
  overflow-y: auto; padding: 24px;
}
.modal-overlay.open { display: flex; justify-content: center; align-items: flex-start; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; width: 100%; max-width: 860px;
  padding: 0; overflow: hidden;
}
.modal-header {
  padding: 20px 24px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { flex: 1; font-size: 1.1rem; font-weight: 900; }
.modal-close {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; border-radius: 6px;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
}
.modal-close:hover { border-color: var(--red); color: var(--red); }
.modal-body { padding: 24px; }

.modal-sections { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width:640px){ .modal-sections { grid-template-columns: 1fr; } }

.modal-section { background: var(--bg3); border-radius: 8px; padding: 16px; }
.modal-section h4 { font-size: 0.85rem; color: var(--text2); margin-bottom: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-section ul { list-style: none; }
.modal-section ul li { font-size: 0.88rem; padding: 6px 0; border-bottom: 1px solid var(--border); color: var(--text); }
.modal-section ul li:last-child { border-bottom: none; }
.modal-section ul li::before { content: '▸ '; color: var(--accent); }

.tip-item { background: var(--bg); border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; color: var(--text); border-right: 3px solid var(--accent2); }
.mistake-item { background: var(--bg); border-radius: 6px; padding: 10px; margin-bottom: 8px; font-size: 0.85rem; color: var(--text); border-right: 3px solid var(--red); }

.exam-stats-row { display: flex; gap: 12px; margin-bottom: 16px; }
.exam-stat { flex: 1; text-align: center; background: var(--bg); border-radius: 8px; padding: 12px; }
.exam-stat .n { font-size: 1.5rem; font-weight: 900; }
.exam-stat .l { font-size: 0.75rem; color: var(--text2); margin-top: 2px; }

.years-list { display: flex; flex-wrap: wrap; gap: 6px; }
.year-tag { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font-size: 0.8rem; color: var(--text2); font-weight: 700; }
.year-tag.recent { background: rgba(240,165,0,0.15); border-color: var(--accent); color: var(--accent); }

/* ===== QUESTIONS PAGE ===== */
.questions-filters {
  display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center;
}
.filter-select {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.88rem;
}
.filter-select:focus { outline: none; border-color: var(--accent); }
.search-input {
  flex: 1; min-width: 200px; background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 8px 14px; border-radius: 8px; font-family: inherit; font-size: 0.88rem;
}
.search-input:focus { outline: none; border-color: var(--accent); }
.search-input::placeholder { color: var(--text2); }

.questions-list { display: flex; flex-direction: column; gap: 12px; }
.question-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px; transition: all 0.2s;
}
.question-card:hover { border-color: var(--border); }
.q-header { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; align-items: center; }
.q-year { background: var(--accent); color: #000; font-weight: 800; font-size: 0.78rem; padding: 3px 10px; border-radius: 6px; }
.q-session { background: var(--bg3); color: var(--text2); font-size: 0.78rem; padding: 3px 10px; border-radius: 6px; }
.q-lesson-tag { background: var(--bg3); color: var(--blue); font-size: 0.78rem; padding: 3px 10px; border-radius: 6px; }
.q-type-tag { font-size: 0.78rem; padding: 3px 10px; border-radius: 6px; }

.q-text { font-size: 0.95rem; color: var(--text); line-height: 1.7; margin-bottom: 14px; }
.q-options { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.q-option { background: var(--bg3); border-radius: 6px; padding: 8px 14px; font-size: 0.88rem; color: var(--text2); border: 1px solid var(--border); }
.q-option.correct { background: rgba(46,160,67,0.15); border-color: var(--green); color: #fff; display: none; }
.q-option.correct.shown { display: block; }

.reveal-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 0.85rem;
  transition: all 0.2s;
}
.reveal-btn:hover { border-color: var(--green); color: var(--green); }
.reveal-btn.revealed { border-color: var(--green); color: var(--green); background: rgba(46,160,67,0.1); }

.print-btn {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 16px; border-radius: 8px;
  cursor: pointer; font-family: inherit; font-size: 0.85rem;
  transition: all 0.2s; margin-right: 8px;
}
.print-btn:hover { border-color: var(--blue); color: var(--blue); }

.no-results { text-align: center; padding: 60px; color: var(--text2); font-size: 1rem; }

/* ===== TEACHING PLAN PAGE ===== */
.plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.week-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
.week-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.week-num { background: var(--accent); color: #000; font-weight: 800; font-size: 0.8rem; padding: 3px 10px; border-radius: 6px; }
.week-progress { flex: 1; background: var(--bg3); height: 4px; border-radius: 2px; overflow: hidden; }
.week-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; }
.session-item { display: flex; gap: 8px; align-items: flex-start; padding: 8px; border-radius: 6px; margin-bottom: 6px; background: var(--bg3); }
.session-num { min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.72rem; font-weight: 700; color: #fff; }
.session-info { flex: 1; }
.session-title { font-size: 0.83rem; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.session-focus { font-size: 0.75rem; color: var(--text2); }

/* ===== EDIT GUIDE ===== */
.edit-section { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.edit-section h3 { font-size: 1rem; font-weight: 700; color: var(--accent); margin-bottom: 12px; }
.code-block { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.83rem; color: #79c0ff; direction: ltr; text-align: left; overflow-x: auto; margin: 8px 0; line-height: 1.6; }
.code-comment { color: #8b949e; }
.code-key { color: #ff7b72; }
.code-val { color: #a5d6ff; }
.code-str { color: #a5d6ff; }
.edit-tip { display: flex; gap: 10px; align-items: flex-start; padding: 10px; background: rgba(56,139,253,0.08); border-radius: 8px; margin-bottom: 8px; font-size: 0.88rem; }
.edit-tip .icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 2px; }

/* ===== BADGE CHIPS ===== */
.badge { display: inline-flex; align-items: center; gap: 4px; }
.badge-dot { width: 8px; height: 8px; border-radius: 50%; }
.heat-dot-5 { background: #ef4444; }
.heat-dot-4 { background: #f97316; }
.heat-dot-3 { background: #eab308; }
.heat-dot-2 { background: #22c55e; }
.heat-dot-1 { background: #3b82f6; }

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  header { padding: 0 12px; }
  .nav-tabs { padding: 8px 12px; }
  .page { padding: 12px; }
  .modal-overlay { padding: 12px; }
}

/* ===== PRINT ===== */
@media print {
  header, .nav-tabs, .questions-filters, .reveal-btn, .print-btn { display: none !important; }
  .page { display: block !important; padding: 0 !important; }
  .question-card { break-inside: avoid; }
  .q-option.correct { display: block !important; }
  body { background: white !important; color: black !important; }
  .question-card { background: white !important; border: 1px solid #ddd !important; }
}

.empty-state { text-align: center; padding: 80px 20px; color: var(--text2); }
.empty-state .big-icon { font-size: 4rem; margin-bottom: 16px; }
.empty-state p { font-size: 0.95rem; }
.section-title { font-size: 0.8rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; margin-top: 20px; }

/* Progress tracker */
.progress-week-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.progress-week-selector label { font-size: 0.88rem; color: var(--text2); }
#current-week-input {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 6px 12px; border-radius: 8px;
  font-family: inherit; font-size: 0.9rem; width: 80px;
}
.current-week-card { border-color: var(--accent) !important; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🧪 بوصلة الكيمياء <span>دليل المعلم التوجيهي</span></div>
  <div id="timer-box" onclick="toggleTimer()">
    <span style="font-size:1rem;">⏱️</span>
    <span id="timer-display">60:00</span>
    <button class="timer-btn" onclick="event.stopPropagation(); resetTimer()" title="إعادة تعيين">↺</button>
  </div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <div class="nav-tab active" onclick="showPage('dashboard')">📊 لوحة التحكم</div>
  <div class="nav-tab" onclick="showPage('lessons')">📚 الدروس</div>
  <div class="nav-tab" onclick="showPage('questions')">🎯 الأسئلة الامتحانية</div>
  <div class="nav-tab" onclick="showPage('plan')">📅 خطة التدريس</div>
  <div class="nav-tab" onclick="showPage('editguide')">✏️ دليل التعديل</div>
</div>

<!-- PAGES -->
<div id="page-dashboard" class="page active"></div>
<div id="page-lessons" class="page"></div>
<div id="page-questions" class="page"></div>
<div id="page-plan" class="page"></div>
<div id="page-editguide" class="page"></div>

<!-- LESSON MODAL -->
<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div id="modal-unit-icon" style="font-size:1.4rem;"></div>
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="data.js"></script>
<script>

// ==============================
// TIMER
// ==============================
let timerSeconds = 3600;
let timerInterval = null;
let timerRunning = false;

function pad(n){ return String(n).padStart(2,'0'); }
function updateTimerDisplay(){
  const m = Math.floor(timerSeconds/60), s = timerSeconds%60;
  document.getElementById('timer-display').textContent = pad(m)+':'+pad(s);
  const box = document.getElementById('timer-box');
  box.className = timerRunning ? (timerSeconds<=300 ? 'warning' : 'running') : '';
}
function toggleTimer(){
  if(timerRunning){
    clearInterval(timerInterval); timerRunning=false;
  } else {
    timerRunning=true;
    timerInterval = setInterval(()=>{
      if(timerSeconds<=0){ clearInterval(timerInterval); timerRunning=false; timerSeconds=0; }
      else timerSeconds--;
      updateTimerDisplay();
    },1000);
  }
  updateTimerDisplay();
}
function resetTimer(){
  clearInterval(timerInterval); timerRunning=false; timerSeconds=3600; updateTimerDisplay();
}
updateTimerDisplay();

// ==============================
// NAVIGATION
// ==============================
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  const names = ['dashboard','lessons','questions','plan','editguide'];
  tabs[names.indexOf(name)].classList.add('active');
  if(!pageBuilt[name]){ buildPage(name); pageBuilt[name]=true; }
}
const pageBuilt = {};

// ==============================
// DATA HELPERS
// ==============================
function getAllLessons(){
  const out=[];
  CURRICULUM.units.forEach(u=>u.lessons.forEach(l=>out.push({...l,unit:u})));
  return out;
}
function getLessonById(id){
  return getAllLessons().find(l=>l.id===id);
}
function getHeatColor(score){
  const cols=['#3b82f6','#22c55e','#eab308','#f97316','#ef4444'];
  return cols[score-1]||cols[0];
}

// ==============================
// QUESTION BANK
// ==============================
const QUESTION_BANK = [
  // الحالة الغازية
  {id:'q1', year:2021, session:'الأولى', lesson:'u1-l1', type:'mcq',
   text:'إذا كان ضغط غاز 2 atm وحجمه 3L عند درجة حرارة ثابتة، فما حجمه عند ضغط 6 atm؟',
   options:['أ) 6 L','ب) 1 L','ج) 9 L','د) 0.5 L'], answer:'ب) 1 L'},
  {id:'q2', year:2022, session:'الأولى', lesson:'u1-l1', type:'mcq',
   text:'الغاز المثالي يطيع قانون PV=nRT. أي التالية يعبّر عن ثابت الغاز R؟',
   options:['أ) 0.082 L·atm/mol·K','ب) 8.314 J/mol·K','ج) كلاهما صحيح','د) 22.4 L/mol'], answer:'ج) كلاهما صحيح'},
  {id:'q3', year:2020, session:'التكميلية', lesson:'u1-l1', type:'calculation',
   text:'غاز حجمه 500 mL عند 27°C. ما حجمه عند 127°C مع ثبات الضغط؟',

// ==============================
// BUILD DASHBOARD
// ==============================
function buildPage(name){
  if(name==='dashboard') buildDashboard();
  if(name==='lessons') buildLessons();
  if(name==='questions') buildQuestions();
  if(name==='plan') buildPlan();
  if(name==='editguide') buildEditGuide();
}

function buildDashboard(){
  const allLessons = getAllLessons();
  const totalFreq = allLessons.reduce((s,l)=>s+l.examFrequency,0);

  // Sort by frequency for heat map
  const sorted = [...allLessons].sort((a,b)=>b.examFrequency-a.examFrequency);
  const maxFreq = sorted[0].examFrequency;

  let html = `
  <div class="stats-grid">
    <div class="stat-card"><div class="icon">📘</div><div class="num">${CURRICULUM.meta.totalLessons}</div><div class="label">درس في المنهاج</div></div>
    <div class="stat-card"><div class="icon">🔥</div><div class="num">${EXAM_STATS.totalExamsAnalyzed}</div><div class="label">امتحان محلَّل (1997-2025)</div></div>
    <div class="stat-card"><div class="icon">⏱️</div><div class="num">48</div><div class="label">حصة خلال 4 أشهر</div></div>
    <div class="stat-card"><div class="icon">🎯</div><div class="num">${EXAM_STATS.predictions2026.length}</div><div class="label">توقعات عالية لـ 2026</div></div>
    <div class="stat-card"><div class="icon">❓</div><div class="num">${QUESTION_BANK.length}</div><div class="label">سؤال في بنك الأسئلة</div></div>
    <div class="stat-card"><div class="icon">📊</div><div class="num">${totalFreq}</div><div class="label">سؤال امتحاني محلَّل</div></div>
  </div>

  <div class="heat-section">
    <h3>🔥 خريطة حرارة الدروس — تكرار الأسئلة 1997-2025 (مرتبة من الأكثر تكراراً)</h3>
    ${sorted.map(l=>`
      <div class="heat-bar">
        <div class="heat-bar-label" title="${l.unit.title}">${l.title}</div>
        <div class="heat-bar-track">
          <div class="heat-bar-fill" style="width:${Math.round(l.examFrequency/maxFreq*100)}%;background:${getHeatColor(l.heatScore)}">${l.examFrequency > 20 ? l.examFrequency + ' مرة' : ''}</div>
        </div>
        <div class="heat-bar-count">${l.examFrequency}</div>
      </div>
    `).join('')}
  </div>

  <div class="section-title">🎯 توقعات امتحان 2026</div>
  <div class="predictions-grid">
    ${EXAM_STATS.predictions2026.map(p=>{
      const lesson = getLessonById(p.lessonId);
      if(!lesson) return '';
      const confClass = p.confidence.includes('جداً') ? 'conf-very-high' : p.confidence.includes('متوسطة') ? 'conf-medium' : 'conf-high';
      return `
      <div class="pred-card" onclick="openModal('${p.lessonId}')">
        <span class="confidence ${confClass}">${p.confidence}</span>
        <h4>${lesson.title}</h4>
        <p>${p.reason}</p>
      </div>`;
    }).join('')}
  </div>
  `;
  document.getElementById('page-dashboard').innerHTML = html;
}

// ==============================
// BUILD LESSONS
// ==============================
function buildLessons(){
  let html = '';
  CURRICULUM.units.forEach(u=>{
    const partBadge = `الجزء ${u.part===1?'الأول':'الثاني'}`;
    html += `
    <div class="unit-section" id="unit-${u.id}">
      <div class="unit-header" onclick="toggleUnit('${u.id}')">
        <span style="font-size:1.3rem">${u.icon}</span>
        <h2 style="color:${u.color}">${u.title}</h2>
        <span class="unit-badge" style="background:${u.color}22;color:${u.color}">${partBadge}</span>
        <span class="unit-badge" style="background:var(--bg3);color:var(--text2)">${u.lessons.length} دروس</span>
        <span class="unit-toggle">▾</span>
      </div>
      <div class="lessons-grid">
        ${u.lessons.map(l=>buildLessonCard(l,u)).join('')}
      </div>
    </div>`;
  });
  document.getElementById('page-lessons').innerHTML = html;
}

function buildLessonCard(l,u){
  const heatColors = {5:'🔴',4:'🟠',3:'🟡',2:'🟢',1:'🔵'};
  const recentYears = l.lastYears.slice(0,3).join('، ');
  return `
  <div class="lesson-card heat-${l.heatScore}" onclick="openModal('${l.id}')">
    <h3>${l.title}</h3>
    <div class="lesson-meta">
      <span class="meta-tag">ص ${l.pages}</span>
      <span class="meta-tag freq">${heatColors[l.heatScore]} ${l.examFrequency} مرة</span>
      <span class="meta-tag">⏱ ${l.teachHours} حصص</span>
      <span class="meta-tag">${l.type==='calculation'?'🧮 حسابي':l.type==='conceptual'?'📖 مفاهيمي':'🔀 مختلط'}</span>
    </div>
    <div class="lesson-types">
      <span class="type-chip type-mcq">اختيار: ${l.examTypes.mcq}</span>
      <span class="type-chip type-essay">مقالي: ${l.examTypes.essay}</span>
      <span class="type-chip type-calc">حسابي: ${l.examTypes.calculation}</span>
    </div>
    <div style="margin-top:8px;font-size:0.75rem;color:var(--text2)">آخر ورود: ${recentYears}</div>
  </div>`;
}

function toggleUnit(id){
  document.getElementById('unit-'+id).classList.toggle('collapsed');
}

// ==============================
// LESSON MODAL
// ==============================
function openModal(lessonId){
  const lesson = getLessonById(lessonId);
  if(!lesson) return;
  const unit = lesson.unit;
  const lessonQuestions = QUESTION_BANK.filter(q=>q.lesson===lessonId);

  document.getElementById('modal-unit-icon').textContent = unit.icon;
  document.getElementById('modal-title').textContent = lesson.title;

  const recentYears = lesson.lastYears.slice(0,5);
  const allYears = lesson.lastYears;

  document.getElementById('modal-body').innerHTML = `
  <!-- Stats Row -->
  <div class="exam-stats-row">
    <div class="exam-stat"><div class="n" style="color:${getHeatColor(lesson.heatScore)}">${lesson.examFrequency}</div><div class="l">مرة في الامتحان</div></div>
    <div class="exam-stat"><div class="n" style="color:var(--blue)">${lesson.examTypes.mcq}</div><div class="l">سؤال اختيار</div></div>
    <div class="exam-stat"><div class="n" style="color:#a78bfa">${lesson.examTypes.essay}</div><div class="l">سؤال مقالي</div></div>
    <div class="exam-stat"><div class="n" style="color:#34d399">${lesson.examTypes.calculation}</div><div class="l">سؤال حسابي</div></div>
    <div class="exam-stat"><div class="n" style="color:var(--accent)">${lesson.teachHours}</div><div class="l">حصص مقترحة</div></div>
  </div>

  <!-- Years appeared -->
  <div style="margin-bottom:16px;">
    <div class="section-title">📅 سنوات الورود (${allYears.length} سنة)</div>
    <div class="years-list">
      ${allYears.map(y=>`<span class="year-tag ${recentYears.includes(y)?'recent':''}">${y}</span>`).join('')}
    </div>
  </div>

  <div class="modal-sections">
    <!-- Key Topics -->
    <div class="modal-section">
      <h4>📌 المواضيع الرئيسية</h4>
      <ul>${lesson.keyTopics.map(t=>`<li>${t}</li>`).join('')}</ul>
    </div>

    <!-- Exam Questions count -->
    <div class="modal-section">
      <h4>❓ أسئلة بنك الأسئلة</h4>
      ${lessonQuestions.length > 0 ? `
        <div style="font-size:0.88rem;color:var(--text2);margin-bottom:8px">${lessonQuestions.length} سؤال متاح في البنك لهذا الدرس</div>
        <button class="reveal-btn" onclick="showPage('questions'); setTimeout(()=>filterByLesson('${lessonId}'),100)">عرض أسئلة هذا الدرس ←</button>
      ` : '<div style="color:var(--text2);font-size:0.85rem">لا توجد أسئلة مضافة بعد لهذا الدرس في البنك</div>'}
    </div>
  </div>

  <!-- Teaching Tips -->
  <div style="margin-top:16px;">
    <div class="section-title">💡 كيف تشرح هذا الدرس؟</div>
    ${lesson.teachingTips.map(t=>`<div class="tip-item">💡 ${t}</div>`).join('')}
  </div>

  <!-- Common Mistakes -->
  <div style="margin-top:16px;">
    <div class="section-title">⚠️ أخطاء شائعة يقع فيها الطلاب</div>
    ${lesson.commonMistakes.map(m=>`<div class="mistake-item">⚠️ ${m}</div>`).join('')}
  </div>

  <!-- Recommended session plan -->
  <div style="margin-top:16px;">
    <div class="section-title">📋 خطة الحصص المقترحة (${lesson.teachHours} حصة)</div>
    <div style="background:var(--bg3);border-radius:8px;padding:14px;">
    ${Array.from({length:lesson.teachHours}).map((_, i)=>`
      <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);${i===lesson.teachHours-1?'border-bottom:none':''}">
        <span style="background:var(--accent);color:#000;font-size:0.75rem;font-weight:800;padding:2px 8px;border-radius:12px;min-width:55px;text-align:center">حصة ${i+1}</span>
        <span style="font-size:0.87rem;color:var(--text)">${i===0?'شرح المفاهيم الأساسية و'+lesson.keyTopics[0]:i===lesson.teachHours-1?'مراجعة الأخطاء الشائعة + تدريب على أسئلة الامتحانات السابقة':'حل أمثلة من الامتحانات الحقيقية + تدريب مُكثّف'}</span>
      </div>`).join('')}
    </div>
  </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

let activeFilters = { type: 'all', lesson: 'all', year: 'all', search: '' };

function filterByLesson(lessonId){
  activeFilters.lesson = lessonId;
  renderQuestions();
  // Update select
  const sel = document.getElementById('filter-lesson');
  if(sel) sel.value = lessonId;
}

function buildQuestions(){
  const allLessons = getAllLessons();
  const years = [...new Set(QUESTION_BANK.map(q=>q.year))].sort((a,b)=>b-a);

  const html = `
  <div class="questions-filters">
    <input class="search-input" id="q-search" placeholder="🔍 ابحث في الأسئلة..." oninput="activeFilters.search=this.value;renderQuestions()">
    <select class="filter-select" id="filter-type" onchange="activeFilters.type=this.value;renderQuestions()">
      <option value="all">كل الأنواع</option>
      <option value="mcq">اختيار من متعدد</option>
      <option value="essay">مقالي</option>
      <option value="calculation">حسابي</option>
    </select>
    <select class="filter-select" id="filter-year" onchange="activeFilters.year=this.value;renderQuestions()">
      <option value="all">كل السنوات</option>
      ${years.map(y=>`<option value="${y}">${y}</option>`).join('')}
    </select>
    <select class="filter-select" id="filter-lesson" onchange="activeFilters.lesson=this.value;renderQuestions()">
      <option value="all">كل الدروس</option>
      ${allLessons.map(l=>`<option value="${l.id}">${l.title}</option>`).join('')}
    </select>
    <button class="print-btn" onclick="window.print()">🖨️ طباعة</button>
  </div>
  <div id="questions-list" class="questions-list"></div>
  `;
  document.getElementById('page-questions').innerHTML = html;
  renderQuestions();
}

function renderQuestions(){
  const {type, lesson, year, search} = activeFilters;
  let filtered = QUESTION_BANK.filter(q=>{
    if(type!=='all' && q.type!==type) return false;
    if(lesson!=='all' && q.lesson!==lesson) return false;
    if(year!=='all' && q.year!=year) return false;
    if(search && !q.text.includes(search) && !q.options.join('').includes(search)) return false;
    return true;
  });

  const typeLabel = {mcq:'اختيار من متعدد',essay:'مقالي',calculation:'حسابي'};
  const typeClass = {mcq:'type-mcq',essay:'type-essay',calculation:'type-calc'};

  if(filtered.length===0){
    document.getElementById('questions-list').innerHTML = `<div class="no-results">🔍 لا توجد نتائج بهذه الفلاتر</div>`;
    return;
  }

  document.getElementById('questions-list').innerHTML = filtered.map(q=>{
    const lesson = getLessonById(q.lesson);
    return `
    <div class="question-card" id="qcard-${q.id}">
      <div class="q-header">
        <span class="q-year">${q.year}</span>
        <span class="q-session">${q.session}</span>
        ${lesson?`<span class="q-lesson-tag">${lesson.title}</span>`:''}
        <span class="q-type-tag ${typeClass[q.type]}">${typeLabel[q.type]}</span>
      </div>
      <div class="q-text">${q.text}</div>
      ${q.options ? `
      <div class="q-options">
        ${q.options.map(o=>`<div class="q-option ${o===q.answer?'correct':''}">${o}</div>`).join('')}
      </div>
      <button class="reveal-btn" id="rbtn-${q.id}" onclick="revealAnswer('${q.id}')">👁️ اكشف الإجابة</button>
      ` : `<div class="q-text" style="color:var(--green)">الإجابة: ${q.answer}</div>`}
    </div>`;
  }).join('');
}

function revealAnswer(qid){
  const card = document.getElementById('qcard-'+qid);
  const btn = document.getElementById('rbtn-'+qid);
  const correct = card.querySelector('.q-option.correct');
  if(correct){ correct.classList.add('shown'); }
  btn.textContent = '✅ الإجابة: '+QUESTION_BANK.find(q=>q.id===qid).answer;
  btn.classList.add('revealed');
}

// ==============================
// BUILD PLAN
// ==============================
function buildPlan(){
  const savedWeek = parseInt(localStorage.getItem('currentWeek'))||1;

  let html = `
  <div class="progress-week-selector">
    <label>الأسبوع الحالي:</label>
    <input type="number" id="current-week-input" min="1" max="16" value="${savedWeek}" onchange="updateCurrentWeek(this.value)">
    <span style="color:var(--text2);font-size:0.85rem">من 16 أسبوع</span>
  </div>
  <div class="plan-grid">`;

  TEACHING_PLAN.forEach(w=>{
    const isCurrent = w.week===savedWeek;
    const progress = Math.round(w.week/16*100);
    html += `
    <div class="week-card ${isCurrent?'current-week-card':''}">
      <div class="week-header">
        <span class="week-num">${isCurrent?'📍':''} الأسبوع ${w.week}</span>
        <div class="week-progress"><div class="week-progress-fill" style="width:${progress}%"></div></div>
      </div>
      ${w.sessions.map(s=>{
        const lesson = getLessonById(s.lessonId);
        const color = lesson ? lesson.unit.color : '#888';
        return `
        <div class="session-item">
          <div class="session-num" style="background:${color}">${s.session}</div>
          <div class="session-info">
            <div class="session-title">${s.lessonTitle}</div>
            <div class="session-focus">${s.focus}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });

  html += '</div>';
  document.getElementById('page-plan').innerHTML = html;
}

function updateCurrentWeek(val){
  localStorage.setItem('currentWeek', val);
  pageBuilt['plan']=false;
  buildPage('plan');
  pageBuilt['plan']=true;
}
